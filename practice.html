<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Design Card</title>
    <style> body{
        background-color: gray;

    }
    .card{
        background-color:white;
        width:160px;
        height:324px;
        border-color:black;
        border-radius: 7px;


    } 
    .image{
        padding:8px;
       img{
        border-radius: 7px
       }
    }
    .content{
        padding:4px;
        p{
            font-size:12px;
        }
       

    }
    .button{
        text-align:center;
    }

   
.button button{
    padding:0px 9px;
    border-radius:9px;
    background-color:rgb(158, 194, 104);
    color:rgb(0, 2, 1);
    font-size:12px;
   margin-top:2px;
cursor:pointer;}
        
    </style>
</head>
<body>
    <div class="card">
        <div class="image">
            <img width="144" src="boat.jpg" alt="Card Image">
        </div>
    <div class="content">
        <h2>Abhishek</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Accusantium tempore, ipsum maiores fuga provident repellendus! Tenetur aut provident soluta accusantium distinctio ab odit!</p>
    </div>
    <div class="button">
        <button>Read More</button>
    </div>
</body>
</html>
